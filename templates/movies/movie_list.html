{% extends 'movies/base.html' %}
{% load static %}

{% block title %}Каталог фильмов | KINOBASE{% endblock %}

{% block content %}
    <div class="hero-section">
        <h1 class="page-title">Кинотека</h1>
        <p class="hero-subtitle">Откройте для себя новые миры и истории</p>
        
        <form method="get" action="{% url 'movie_list' %}" class="search-form" id="search-form">
            <input type="text" name="q" id="search-input" data-url="{% url 'movie_list' %}" value="{{ search_query }}" placeholder="Найти фильм по названию..." class="search-input" autocomplete="off">
            <button type="submit" class="btn-primary search-btn">Найти</button>
            <a href="{% url 'movie_list' %}" class="btn-reset-search {% if not search_query %}hidden{% endif %}" id="reset-search-btn" title="Сбросить поиск">✕</a>
        </form>
    </div>

    <!-- Панель сортировки -->
    <div class="sorting-panel" style="display: flex; gap: 15px; justify-content: center; margin-bottom: 30px;">
        <span class="sorting-label" style="color: var(--text-secondary);">Сортировка:</span>
        <a href="?sort=-id{% if search_query %}&q={{ search_query }}{% endif %}" 
           style="text-decoration: none; color: {% if current_sort == '-id' %}var(--text-main); font-weight: bold; border-bottom: 2px solid var(--accent);{% else %}var(--text-secondary){% endif %};">
           Новинки
        </a>
        <a href="?sort=rating{% if search_query %}&q={{ search_query }}{% endif %}" 
           style="text-decoration: none; color: {% if current_sort == 'rating' %}var(--text-main); font-weight: bold; border-bottom: 2px solid var(--accent);{% else %}var(--text-secondary){% endif %};">
           По рейтингу
        </a>
        <a href="?sort=title{% if search_query %}&q={{ search_query }}{% endif %}" 
           style="text-decoration: none; color: {% if current_sort == 'title' %}var(--text-main); font-weight: bold; border-bottom: 2px solid var(--accent);{% else %}var(--text-secondary){% endif %};">
           По алфавиту
        </a>
    </div>

    <div id="search-results-region">
        {% include 'movies/includes/movie_search_results.html' %}
    </div>
{% endblock %}
